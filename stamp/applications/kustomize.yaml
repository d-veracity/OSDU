######################
## Global Components (CRDs and base resources)
######################
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: components-global
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./software/components/global
  prune: true
  wait: true

######################
## OSDU System Components  
######################
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: components-osdu-system
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./software/components/osdu-system
  prune: true
  wait: true
  dependsOn:
    - name: components-global

######################
## Mesh Ingress Components
######################
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: components-mesh-ingress
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./software/components/mesh-ingress
  prune: true
  wait: true
  dependsOn:
    - name: components-global
  healthChecks:
    - kind: Deployment
      name: podinfo
      namespace: podinfo


######################
## OSDU Auth
######################
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: application-osdu-auth
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./software/applications/osdu-auth
  prune: true
  wait: true
  dependsOn:
    - name: components-osdu-system
  healthChecks:
    - kind: Deployment
      name: osdu-auth
      namespace: osdu-auth


######################
## OSDU Core
######################
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: application-osdu-core
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 8m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./software/applications/osdu-core
  prune: true
  wait: true
  dependsOn:
